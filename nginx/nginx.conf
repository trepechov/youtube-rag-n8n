upstream chat_api {
    server chat-api:8000;
}

upstream n8n_backend {
    server n8n:5678;
}

# Rate limiting zone — 30 req/min per IP on the chat endpoint
limit_req_zone $binary_remote_addr zone=chat_limit:10m rate=30r/m;

server {
    listen 80;
    server_name _;

    # If you add SSL via Certbot, replace this block with the HTTPS redirect:
    # return 301 https://$host$request_uri;

    # -----------------------------------------------------------------------
    # Chat API — publicly accessible
    # -----------------------------------------------------------------------
    location /api/ {
        limit_req zone=chat_limit burst=10 nodelay;

        proxy_pass http://chat_api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # -----------------------------------------------------------------------
    # Widget static files
    # -----------------------------------------------------------------------
    location /widget/ {
        alias /var/www/widget/;
        add_header Cache-Control "public, max-age=86400";
        add_header Access-Control-Allow-Origin *;
    }

    # -----------------------------------------------------------------------
    # n8n — restricted; add IP allowlist or auth in production
    # -----------------------------------------------------------------------
    location /n8n/ {
        # Uncomment to restrict to specific IPs:
        # allow 1.2.3.4;
        # deny all;

        proxy_pass http://n8n_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Required for n8n WebSocket connections
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
    }

    # -----------------------------------------------------------------------
    # Qdrant dashboard — NOT exposed (internal only by design)
    # Comment in only for temporary debugging from a trusted IP
    # -----------------------------------------------------------------------
    # location /qdrant/ {
    #     allow 1.2.3.4;
    #     deny all;
    #     proxy_pass http://qdrant:6333/;
    # }
}
